<div class="catalogue" id="catalogue">
  {% assign standards = site.standards | sort: "sequence" %}
  {% for standard in standards %}
    <a class="standard-row" href="{{ site.baseurl }}{{ standard.url }}" data-title="{{ standard.title | downcase }}" data-content="{{ standard.content | strip_html | strip_newlines | downcase }}" data-type="{{ standard.type }}">
      <span class="row-id">{{ standard.standard_id }}</span>
      <span class="row-main">
        <strong>{{ standard.title }}</strong>
        <small>{{ standard.summary }}</small>
      </span>
      <span class="row-category">{{ site.standard_classification[standard.type] }}</span>
      <span class="row-status">{{ standard.doc-status }}</span>
    </a>
  {% endfor %}
</div>
